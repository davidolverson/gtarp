# listings/rugs, clout going-live, evidence case desk, counterfeit news
# bulletins). Each feed is OFF until its webhook convar is set below —
# create one webhook per Discord channel and paste the URLs. The boot
# banner lists which feeds are live. Staff audit and perf hitch webhooks
