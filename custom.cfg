# Shared ox_lib panel renderer - the civic resources below send their command
# output here as ONE panel/toast instead of dumping lines into chat. Must start
# BEFORE them (client-only, loose coupling, but keep the order correct).
ensure palm6_ui

# Self-contained civic + economy resources (2026-07-12). Each is a NEW isolated
# resource: reads existing tables (or self-creates only its OWN tables at boot),
# makes ZERO edits to crime files, and soft-degrades if a table is missing. So a
# fault in any one cannot break the crime layer. Multi-agent static-audited
# clean (6/9) or fixed (lottery race, season archive-dup, rapsheet cmd rename).
ensure palm6_ems
ensure palm6_season
ensure palm6_blotter
ensure palm6_wanted
ensure palm6_rapsheet
ensure palm6_ganginfo
ensure palm6_citystats
ensure palm6_lottery
ensure palm6_help

