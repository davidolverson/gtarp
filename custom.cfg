# ============================================================================
# custom.cfg — exec'd from the bottom of the recipe-generated server.cfg.
#
# This file is the entry point for everything in the custom layer. Keep it
# free of secrets — real credentials, license keys, and API tokens belong in
# txAdmin's secret-managed config, never in version control.
# ============================================================================

# ---------------------------------------------------------------------------
# Server identity (Palm6 branding)
# ---------------------------------------------------------------------------
# custom.cfg execs from the BOTTOM of the recipe/panel-generated server.cfg,
# so these override whatever name that (panel-managed) server.cfg set earlier.
# This is how the live server-browser name gets rebranded without panel access.
sv_hostname "Palm6 Roleplay"
sets sv_projectName "Palm6"
sets sv_projectDesc "Palm6 Roleplay"

# ---------------------------------------------------------------------------
# Convars — qbx_core multichar / starting funds (Phase 1)
# ---------------------------------------------------------------------------
# These are the boot-time values the qbx_core override resource publishes.
# Edit here OR in resources/[custom]/config_overrides/qbx_core/config.lua —
# the override resource re-publishes its file values on resource start, so
# its config.lua wins if both are set.
set qbx:multichar_slots         2
set qbx:required_identifiers    "license,discord"
set qbx:character_name_min      2
set qbx:character_name_max      24
set qbx:starting_cash           500
set qbx:starting_bank           5000
set qbx:starting_crypto         0

# ---------------------------------------------------------------------------
# Convars — economy (Phase 2)
# ---------------------------------------------------------------------------
# qbx_economy_overrides re-publishes its config.lua values on resource
# start, so its config.lua wins if both are set. These set lines exist for
# operators who prefer cfg-only tuning.
set qbx:paycheck_interval_minutes 7
set qbx:paycheck_onduty_only      true
set qbx:paycheck_min              0
set qbx:paycheck_max              5000
set qbx:currency_symbol           "$"
set qbx:currency_code             "USD"

# ---------------------------------------------------------------------------
# Convars — server_base tuning
# ---------------------------------------------------------------------------
# setr server_base:debug false
# set   server_base:locale "en"

# ---------------------------------------------------------------------------
# Performance convars (Phase 10) — disable unused recipe resources here
# ---------------------------------------------------------------------------
# Example: trim resources you don't use to free thread budget.
# set sv_disableresource old_unused_resource
# set sv_disableresource another_one

# ---------------------------------------------------------------------------
# Security convars (Phase 8) — defence in depth
# ---------------------------------------------------------------------------
sv_filterRequestControl 2
sv_scriptHookAllowed    0
sv_authMaxVariance      1
sv_authMinTrust         5
onesync_distanceCullVehicles true

# ---------------------------------------------------------------------------
# Custom resources
# ---------------------------------------------------------------------------
# Order matters:
#   - qbx_core_overrides: must start before any consumer reads the
#     published convars.
#   - server_identity: owns the loading screen — must start before joins.
#   - server_base: commands + welcome notify. Depends on qbx_core + ox_lib.

