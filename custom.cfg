ensure palm6_cityfeed
# set palm6:cityfeed_url    "https://horizon-bot-production-4dfc.up.railway.app/webhooks/game-event"
# set palm6:cityfeed_secret "<same value as the bot GAME_EVENT_SIGNING_SECRET>"
ensure server_identity
ensure server_base

# ---------------------------------------------------------------------------
# Custom asset pipeline — first prop built headless (Blender + Sollumz)
# ---------------------------------------------------------------------------
# mystudio_props streams mystudio_crate.ydr (drawable + embedded collision) and
# registers mystudio_props.ytyp via DLC_ITYP_REQUEST. prop_spawn is a DEV-ONLY
# test helper that adds /crate, /prop <model>, /clearprops (client-side, no ACE
# gate — any player can run it). Remove prop_spawn before real players are on.
ensure mystudio_props
ensure prop_spawn

# palm6_props: branded Palm6 prop set (palm6_sign, palm6_crate, palm6_barrier),
# each an embedded-texture .ydr + typed box collision. Spawn by model name
# (use prop_spawn's /prop <model> while it is loaded).
ensure palm6_props

# Dev-only cross-resource contract self-tests (evidence v2 API, staff log
# sink, export shapes). Runs ONLY when the palm6:devtest convar is 1 —
# leave that convar unset in production. Prints PASS/FAIL + summary.
# The ACE below lets the self-test console-invoke palm6_perf's restricted
# /diag end-to-end (ExecuteCommand from a resource is ACE-checked against
# the resource principal, not console). Harmless in production — the
# resource is inert without the convar.
ensure palm6_devtest
add_ace resource.palm6_devtest command.diag allow

# ONE-SHOT migration applier — creates pending tables (0040/0042/0043/0044) via
# the server DB connection since the prod DB isn't externally reachable. All
# statements are IF NOT EXISTS. Remove this line + the resource once confirmed.
ensure palm6_dbmigrate

# ---------------------------------------------------------------------------
# ACE permissions for custom commands
# ---------------------------------------------------------------------------
# /coords (server_base) — admin only.
add_ace group.admin command.coords allow

# Staff can /setjob on whitelisted emergency-services jobs. The
# palm6_whitelist_jobs guard still applies for non-staff principals.
add_ace group.admin command.setjob allow
add_ace group.eup   command.setjob allow

# Example principal-to-group mapping for an EUP (whitelisted-services)
# role. Repeat with real identifiers, and keep this list audited.
# add_principal identifier.license:CHANGEME group.eup

# ---------------------------------------------------------------------------
# Staff ACE matrix (Phase 7)
# ---------------------------------------------------------------------------
# Owner inherits admin. Admin and mod get the bulk. Trial gets read-only.
# Per-role principal mappings live in your server.cfg, not here.
#
# /tp /tpm /revive /heal are the RECIPE's commands (qbx_core, qbx_medical),
# registered restricted — ox_lib auto-grants their command.<name> ACEs to
# group.admin only, so the grants below are what extend them to mods.
# (palm6_staff's duplicate command registrations were removed 2026-07-03 —
# goto/bring live in qbx_adminmenu's menu, which has its own perms.)
add_ace group.owner command         allow

add_ace group.admin command.giveitem allow

add_ace group.mod   command.tp      allow
add_ace group.mod   command.tpm     allow
add_ace group.mod   command.revive  allow
add_ace group.mod   command.heal    allow

# palm6_perf's /diag health readout — plain RegisterCommand(restricted),
# no ox_lib auto-grant, so admin needs an explicit ACE too.
add_ace group.admin command.diag    allow
add_ace group.mod   command.diag    allow

# palm6_economy's /economy crime-economy scoreboard — same ACE model as /diag.
add_ace group.admin command.economy allow
add_ace group.mod   command.economy allow

# Civic/economy resources (2026-07-12). These commands are RegisterCommand
# (restricted=false) and self-check an ace, so staff need explicit grants.
# lotterydraw + season(open/close) are admin actions. blotter + priors are
# police lookups admins should also reach without switching jobs. citystats
# and help are open to everyone. help's ace only reveals the Admin category.
add_ace group.admin command.lotterydraw allow
add_ace group.admin command.season      allow
add_ace group.admin command.blotter     allow
add_ace group.admin command.priors      allow
add_ace group.admin command.citystats   allow
add_ace group.admin command.help        allow
add_ace group.mod   command.blotter     allow
add_ace group.mod   command.priors      allow

add_ace group.trial command.coords  allow
