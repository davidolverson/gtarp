# ============================================================================
# custom.cfg — exec'd from the bottom of the recipe-generated server.cfg.
#
# This file is the entry point for everything in the custom layer. Keep it
# free of secrets — real credentials, license keys, and API tokens belong in
# txAdmin's secret-managed config, never in version control.
# ============================================================================

# ---------------------------------------------------------------------------
# Convars — qbx_core multichar / starting funds (Phase 1)
# ---------------------------------------------------------------------------
# These are the boot-time values the qbx_core override resource publishes.
# Edit here OR in resources/[custom]/config_overrides/qbx_core/config.lua —
# the override resource re-publishes its file values on resource start, so
# its config.lua wins if both are set.
set qbx:multichar_slots         2
set qbx:required_identifiers    "license,discord"
set qbx:character_name_min      2
set qbx:character_name_max      24
set qbx:starting_cash           500
set qbx:starting_bank           5000
set qbx:starting_crypto         0

# ---------------------------------------------------------------------------
# Convars — economy (Phase 2)
# ---------------------------------------------------------------------------
# qbx_economy_overrides re-publishes its config.lua values on resource
# start, so its config.lua wins if both are set. These set lines exist for
# operators who prefer cfg-only tuning.
set qbx:paycheck_interval_minutes 7
set qbx:paycheck_onduty_only      true
set qbx:paycheck_min              0
set qbx:paycheck_max              5000
set qbx:currency_symbol           "$"
set qbx:currency_code             "USD"

# ---------------------------------------------------------------------------
# Convars — server_base tuning
# ---------------------------------------------------------------------------
# setr server_base:debug false
# set   server_base:locale "en"

# ---------------------------------------------------------------------------
# Performance convars (Phase 10) — disable unused recipe resources here
# ---------------------------------------------------------------------------
# Example: trim resources you don't use to free thread budget.
# set sv_disableresource old_unused_resource
# set sv_disableresource another_one

# ---------------------------------------------------------------------------
# Security convars (Phase 8) — defence in depth
# ---------------------------------------------------------------------------
sv_filterRequestControl 2
sv_scriptHookAllowed    0
sv_authMaxVariance      1
sv_authMinTrust         5
onesync_distanceCullVehicles true

# ---------------------------------------------------------------------------
# Custom resources
# ---------------------------------------------------------------------------
# Order matters:
#   - qbx_core_overrides: must start before any consumer reads the
#     published convars.
#   - server_identity: owns the loading screen — must start before joins.
#   - server_base: commands + welcome notify; depends on qbx_core + ox_lib.

ensure qbx_core_overrides
ensure qbx_economy_overrides
ensure qbx_police_overrides
ensure qbx_ambulance_overrides
ensure qbx_civilian_jobs_overrides
ensure ox_inventory_overrides
ensure qbx_density_overrides
ensure gtarp_whitelist_jobs
ensure gtarp_staff
ensure gtarp_eventguard
ensure gtarp_allowlist
ensure gtarp_courier
ensure gtarp_housing
ensure gtarp_grind
ensure gtarp_robbery
ensure gtarp_mechanic
ensure gtarp_perf
ensure server_identity
ensure server_base

# ---------------------------------------------------------------------------
# ACE permissions for custom commands
# ---------------------------------------------------------------------------
# /coords (server_base) — admin only.
add_ace group.admin command.coords allow

# Staff can /setjob on whitelisted emergency-services jobs. The
# gtarp_whitelist_jobs guard still applies for non-staff principals.
add_ace group.admin command.setjob allow
add_ace group.eup   command.setjob allow

# Example principal-to-group mapping for an EUP (whitelisted-services)
# role. Repeat with real identifiers; keep this list audited.
# add_principal identifier.license:CHANGEME group.eup

# ---------------------------------------------------------------------------
# Staff ACE matrix (Phase 7)
# ---------------------------------------------------------------------------
# Owner inherits admin; admin and mod get the bulk; trial gets read-only.
# Per-role principal mappings live in your server.cfg, not here.
add_ace group.owner command         allow

add_ace group.admin command.staff   allow
add_ace group.admin command.tp      allow
add_ace group.admin command.tpm     allow
add_ace group.admin command.bring   allow
add_ace group.admin command.goto    allow
add_ace group.admin command.revive  allow
add_ace group.admin command.heal    allow
add_ace group.admin command.giveitem allow

add_ace group.mod   command.staff   allow
add_ace group.mod   command.tp      allow
add_ace group.mod   command.tpm     allow
add_ace group.mod   command.bring   allow
add_ace group.mod   command.goto    allow
add_ace group.mod   command.revive  allow
add_ace group.mod   command.heal    allow

add_ace group.trial command.coords  allow
