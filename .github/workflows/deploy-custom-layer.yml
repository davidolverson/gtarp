name: Deploy custom layer

# Auto-deploys the Qbox custom layer to the live FiveM server.
#   - Uploads resources/[custom]/ (and optionally custom.cfg) over SFTP.
#   - Patches custom ox_inventory items into the deployed data/items.lua
#     (tools/patch-ox-items.sh — runtime merges can never register items).
#   - Restarts the FXServer via the Pterodactyl power API so new code loads.
#   - Flags sql/*.sql migrations added/changed since the last successful
#     deploy — the DB is NEVER touched by CI; apply those manually.
# See DEPLOY.md for setup, required secrets, and toggles.

on:
  push:
    branches: [main]
    paths:
      - 'resources/**'
      - 'custom.cfg'
  workflow_dispatch:

# Never run two deploys at once; queue the newest, cancel an in-flight one.
concurrency:
  group: deploy-custom-layer
  cancel-in-progress: true

env:
  # Non-secret connection details. Override any of these by creating a repo
  # variable (Settings > Secrets and variables > Actions > Variables) of the
  # same name. Secrets (SFTP_PASSWORD, PTERO_API_KEY) are NOT defaulted here.
  SFTP_HOST: ${{ vars.SFTP_HOST || 'fx-dtx-10.apollopanel.com' }}
  SFTP_PORT: ${{ vars.SFTP_PORT || '2022' }}
  SFTP_USERNAME: ${{ vars.SFTP_USERNAME || 'w8bh16e6.9524616c' }}
  PANEL_URL: ${{ vars.PANEL_URL || 'https://control.rocketnode.com' }}
  SERVER_ID: ${{ vars.SERVER_ID || '9524616c' }}
  REMOTE_BASE: ${{ vars.REMOTE_BASE || '.' }}
  # Set to 'false' (repo variable UPLOAD_CUSTOM_CFG) to skip pushing custom.cfg.
  UPLOAD_CUSTOM_CFG: ${{ vars.UPLOAD_CUSTOM_CFG || 'true' }}
  # Set repo variable MIRROR_DELETE to 'true' for a strict exact mirror that
  # deletes server-side files not present in the repo. Default is additive.
  MIRROR_DELETE: ${{ vars.MIRROR_DELETE || 'false' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check that deploy secrets are configured
        id: guard
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_SSH_KEY: ${{ secrets.SFTP_SSH_KEY }}
        run: |
          # An SFTP credential is required: either SSH key (preferred) or
          # password. This lets the operator drop SFTP_PASSWORD once key auth
          # is confirmed, as long as SFTP_SSH_KEY remains set.
          if [ -z "${SFTP_SSH_KEY:-}" ] && [ -z "${SFTP_PASSWORD:-}" ]; then
            echo "secrets not configured — skipping deploy."
            echo "Add SFTP_SSH_KEY (preferred) or SFTP_PASSWORD (see DEPLOY.md) to enable deploys."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "Deploy secrets present; proceeding."
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          # Full history so the migration check can diff against the commit of
          # the last successful deploy (a shallow clone can't reach it).
          fetch-depth: 0

      - name: Install lftp and lua
        if: steps.guard.outputs.configured == 'true'
        # lua5.4 syntax-checks the patched ox_inventory items.lua before it is
        # pushed back to the live server.
        run: sudo apt-get update && sudo apt-get install -y lftp lua5.4

      - name: Upload custom layer over SFTP
        id: upload
        if: steps.guard.outputs.configured == 'true'
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_SSH_KEY: ${{ secrets.SFTP_SSH_KEY }}
        run: |
          set -euo pipefail

          DELETE_FLAG=""
          if [ "$MIRROR_DELETE" = "true" ]; then
            DELETE_FLAG="--delete"
            echo "Strict mirror enabled: server-side files absent from the repo will be removed."
          fi

          # Auth selection: prefer SSH key (SFTP_SSH_KEY) when present, else
          # fall back to password (SFTP_PASSWORD). The private key is written to
          # a 0600 temp file and removed on exit; it is never echoed.
          KEYFILE=""
          cleanup() { [ -n "$KEYFILE" ] && rm -f "$KEYFILE" || true; }
          trap cleanup EXIT

          if [ -n "${SFTP_SSH_KEY:-}" ]; then
            AUTH_MODE="ssh-key"
            KEYFILE="$(mktemp)"
            chmod 600 "$KEYFILE"
            printf '%s\n' "$SFTP_SSH_KEY" > "$KEYFILE"
          else
            AUTH_MODE="password"
          fi
          echo "SFTP auth mode: $AUTH_MODE"
          echo "auth_mode=$AUTH_MODE" >> "$GITHUB_OUTPUT"

          # Run lftp with the chosen auth. lftp commands are read from stdin and
          # appended after the connection is opened. Common settings (incl. the
          # cmd:fail-exit that fails the job on any lftp error) are identical
          # across both auth modes.
          run_lftp() {
            local cmds
            cmds="$(cat)"
            if [ "$AUTH_MODE" = "ssh-key" ]; then
              lftp <<LFTP
          set sftp:auto-confirm yes
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 30
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i $KEYFILE"
          open -u "$SFTP_USERNAME" "sftp://$SFTP_HOST:$SFTP_PORT"
          $cmds
          bye
          LFTP
            else
              lftp <<LFTP
          set sftp:auto-confirm yes
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 30
          open -u "$SFTP_USERNAME,$SFTP_PASSWORD" "sftp://$SFTP_HOST:$SFTP_PORT"
          $cmds
          bye
          LFTP
            fi
          }

          # Reverse-mirror (upload) the custom layer. The [custom] and
          # [config_overrides] folders contain literal square brackets. Inside
          # lftp's own command parser the bracketed path must be passed as a
          # plain double-quoted string — NOT backslash-escaped. (Escaping with
          # \[ \] makes lftp look for a directory literally named "\[custom\]",
          # which doesn't exist.)
          run_lftp <<EOF
          mirror --reverse --verbose --no-perms $DELETE_FLAG "resources/[custom]/" "$REMOTE_BASE/resources/[custom]/"
          EOF
          echo "Custom layer uploaded to $REMOTE_BASE/resources/[custom]/"

          if [ "$UPLOAD_CUSTOM_CFG" = "true" ]; then
            run_lftp <<EOF
          put custom.cfg -o "$REMOTE_BASE/custom.cfg"
          EOF
            echo "custom.cfg uploaded to $REMOTE_BASE/custom.cfg"
            echo "cfg_uploaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping custom.cfg upload (UPLOAD_CUSTOM_CFG != true)."
            echo "cfg_uploaded=false" >> "$GITHUB_OUTPUT"
          fi

          # ---- Sync custom ox_inventory items into the deployed items.lua ----
          # ox_inventory builds its ItemList ONLY from its own data/items.lua;
          # the overrides resource's runtime merge can never register items
          # (Items() returns a msgpack copy). Pull the live file, patch the
          # GTARP marker block in with tools/patch-ox-items.sh (idempotent,
          # never shadows recipe-defined names), syntax-check, push it back —
          # all BEFORE the restart step so the new boot picks it up. On any
          # failure the live file is left untouched and we warn loudly; the
          # overrides resource prints FATAL lines at boot for missing items.
          # NOTE: set -e is suppressed inside an `if (...)` condition, so the
          # subshell chains every command with && — a failure at any point
          # (download, patch, syntax check) must skip the upload and report
          # FAILED, never fall through.
          OX_ITEMS_STATUS="FAILED — run tools/patch-ox-items.sh against the live resources dir manually"
          if (
            WORK="$(mktemp -d)" &&
            mkdir -p "$WORK/[ox]/ox_inventory/data" &&
            run_lftp <<EOF &&
          get "$REMOTE_BASE/resources/[ox]/ox_inventory/data/items.lua" -o "$WORK/[ox]/ox_inventory/data/items.lua"
          EOF
            bash tools/patch-ox-items.sh "$WORK" &&
            # ox_inventory item defs may use CfxLua backtick hash literals
            # (model = `prop_x`): the live server accepts them, but stock
            # lua5.4 rejects them as a syntax error and would fail the gate on
            # a perfectly valid file (silently skipping the item sync). Check a
            # COPY with backticks flattened to strings so the gate still catches
            # real syntax errors; the file we upload keeps its original backticks.
            sed 's/`/"/g' "$WORK/[ox]/ox_inventory/data/items.lua" > "$WORK/items.check.lua" &&
            lua5.4 -e "assert(loadfile('$WORK/items.check.lua'))" &&
            run_lftp <<EOF
          put "$WORK/[ox]/ox_inventory/data/items.lua" -o "$REMOTE_BASE/resources/[ox]/ox_inventory/data/items.lua"
          EOF
          ); then
            OX_ITEMS_STATUS="synced"
            echo "ox_inventory items patched and re-uploaded."
          else
            echo "::warning::ox_inventory item sync FAILED — custom items will NOT register until tools/patch-ox-items.sh is run against the live server's resources dir. ox_inventory_overrides will print FATAL lines at boot naming each missing item."
          fi
          echo "ox_items=$OX_ITEMS_STATUS" >> "$GITHUB_OUTPUT"

          # ---- Sync Palm6 vehicle prices into the deployed qbx_core vehicles.lua ----
          # qbx_vehicleshop reads car prices from qbx_core/shared/vehicles.lua and
          # there is no runtime "set price" export, so tools/patch-vehicle-prices.sh
          # rewrites ONLY the price field for gtarp_dealership catalog models in the
          # live file (idempotent; never touches coords, categories, hashes, or any
          # non-catalog model). Same pull→patch→syntax-check→push contract as the ox
          # items sync above; on any failure the live file is left untouched and we
          # warn loudly. vehicles.lua uses CfxLua backtick hash literals, so the
          # syntax gate checks a copy with backticks flattened to strings.
          VEH_PRICES_STATUS="FAILED — run tools/patch-vehicle-prices.sh against the live resources dir manually"
          if (
            WORK="$(mktemp -d)" &&
            mkdir -p "$WORK/[qbx]/qbx_core/shared" &&
            run_lftp <<EOF &&
          get "$REMOTE_BASE/resources/[qbx]/qbx_core/shared/vehicles.lua" -o "$WORK/[qbx]/qbx_core/shared/vehicles.lua"
          EOF
            bash tools/patch-vehicle-prices.sh "$WORK" &&
            sed 's/`/"/g' "$WORK/[qbx]/qbx_core/shared/vehicles.lua" > "$WORK/vehicles.check.lua" &&
            lua5.4 -e "assert(loadfile('$WORK/vehicles.check.lua'))" &&
            run_lftp <<EOF
          put "$WORK/[qbx]/qbx_core/shared/vehicles.lua" -o "$REMOTE_BASE/resources/[qbx]/qbx_core/shared/vehicles.lua"
          EOF
          ); then
            VEH_PRICES_STATUS="synced"
            echo "qbx_core vehicle prices patched and re-uploaded."
          else
            echo "::warning::vehicle price sync FAILED — Palm6 catalog prices will NOT apply until tools/patch-vehicle-prices.sh is run against the live server's resources dir (check the [qbx]/qbx_core path)."
          fi
          echo "veh_prices=$VEH_PRICES_STATUS" >> "$GITHUB_OUTPUT"

      - name: Restart FXServer via Pterodactyl
        id: restart
        if: steps.guard.outputs.configured == 'true'
        env:
          PTERO_API_KEY: ${{ secrets.PTERO_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$PTERO_API_KEY" ]; then
            echo "::warning::PTERO_API_KEY not set — skipping server restart. Restart manually so new code loads."
            echo "restarted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HTTP_CODE=$(curl -sS -o /tmp/ptero_resp.txt -w "%{http_code}" \
            -X POST "$PANEL_URL/api/client/servers/$SERVER_ID/power" \
            -H "Authorization: Bearer $PTERO_API_KEY" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"signal":"restart"}')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Restart signal accepted (HTTP $HTTP_CODE)."
            echo "restarted=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Restart request failed (HTTP $HTTP_CODE)."
            cat /tmp/ptero_resp.txt || true
            exit 1
          fi

      - name: Check for SQL migrations needing manual apply
        id: sqlcheck
        if: steps.guard.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # CI NEVER touches the production database. sql/*.sql migrations are
          # applied manually on the game host — this step just makes sure a
          # deploy that needs one can't slip by silently. It diffs sql/
          # against the commit of the last SUCCESSFUL deploy run, so sql-only
          # pushes (which don't trigger this workflow) are still caught by the
          # next deploy that does run.
          LAST_SHA="$(gh run list --workflow deploy-custom-layer.yml --branch "$GITHUB_REF_NAME" --status success --limit 1 --json headSha --jq '.[0].headSha' 2>/dev/null || true)"
          if [ -n "$LAST_SHA" ] && git cat-file -e "$LAST_SHA" 2>/dev/null; then
            PENDING="$(git diff --name-only --diff-filter=ACMR "$LAST_SHA"..HEAD -- 'sql/*.sql' || true)"
            BASIS="new/changed since last successful deploy (\`${LAST_SHA:0:9}\`)"
          else
            PENDING="$(ls sql/*.sql 2>/dev/null || true)"
            BASIS="no prior successful deploy found — listing ALL migrations; apply any not yet applied"
          fi

          if [ -n "$PENDING" ]; then
            COUNT="$(echo "$PENDING" | grep -c . || true)"
            echo "::warning::$COUNT SQL migration file(s) need MANUAL apply on the game host — deploys never touch the DB. See the run summary for the list."
            {
              echo "## ⚠️ Manual SQL migrations required"
              echo "Basis: $BASIS"
              echo ""
              echo "$PENDING" | sed 's/^/- `/; s/$/`/'
              echo ""
              echo "Apply each on the game host DB before/at restart, e.g.:"
              echo '```'
              echo "$PENDING" | sed 's|^|mariadb -u<user> -p <db> < |'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "pending_sql=$COUNT" >> "$GITHUB_OUTPUT"
          else
            echo "No SQL migrations pending ($BASIS)."
            echo "pending_sql=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "## Deploy summary"
            if [ "${{ steps.guard.outputs.configured }}" != "true" ]; then
              echo "- Status: **skipped** (deploy secrets not configured)."
              exit 0
            fi
            echo "- Uploaded: \`resources/[custom]/\` -> \`$REMOTE_BASE/resources/[custom]/\`"
            echo "- custom.cfg uploaded: \`${{ steps.upload.outputs.cfg_uploaded }}\`"
            echo "- ox_inventory items: \`${{ steps.upload.outputs.ox_items }}\`"
            echo "- vehicle prices (qbx_core): \`${{ steps.upload.outputs.veh_prices }}\`"
            echo "- Strict mirror (--delete): \`$MIRROR_DELETE\`"
            echo "- Server restart triggered: \`${{ steps.restart.outputs.restarted }}\`"
            echo "- SQL migrations pending manual apply: \`${{ steps.sqlcheck.outputs.pending_sql }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
