<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Santos Roleplay</title>
    <link rel="stylesheet" href="loading.css">
</head>
<body>
    <main class="stage">
        <div class="frame">
            <p class="eyebrow">Now connecting</p>
            <h1 class="brand">Los Santos Roleplay</h1>
            <p class="subtitle">A Qbox roleplay community</p>

            <div class="progress" aria-hidden="true">
                <div class="progress-bar"></div>
            </div>

            <p class="tip">
                <span class="tip-label">Tip</span>
                <span class="tip-body">Stay in character. Use /me and /do for actions and details.</span>
            </p>
        </div>

        <p class="footnote">Allowlist via Discord — see the #rules channel. If the screen hangs for more than a minute, check the Discord for outage notices.</p>
    </main>
</body>
</html>
