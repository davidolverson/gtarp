<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Palm6 Command Panel</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main
    id="overlay"
    class="overlay"
    aria-live="polite"
    aria-hidden="true"
  >
    <section
      id="panel"
      class="command-panel"
      role="dialog"
      aria-modal="false"
      aria-labelledby="panel-title"
      tabindex="-1"
    >
      <div class="panel-highlight" aria-hidden="true"></div>

      <header class="panel-header">
        <div class="panel-heading">
          <span id="panel-tag" class="panel-tag">CITY</span>

          <div class="title-group">
            <span class="title-kicker">PALM6 COMMAND</span>
            <h1 id="panel-title" class="panel-title">City Information</h1>
          </div>
        </div>

        <button
          id="close-button"
          class="close-button"
          type="button"
          aria-label="Close panel"
        >
          <span aria-hidden="true">&times;</span>
        </button>
      </header>

      <div class="header-rule" aria-hidden="true">
        <span class="header-rule-fill"></span>
        <span class="header-rule-flare"></span>
      </div>

      <div id="panel-body" class="panel-body">
        <div id="rows" class="rows"></div>
      </div>

      <footer id="panel-footer" class="panel-footer">
        <span class="footer-brand">
          <span class="brand-star" aria-hidden="true">&#10022;</span>
          PALM6
        </span>

        <span class="footer-hint">
          ESC TO CLOSE
        </span>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
